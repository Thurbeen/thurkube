{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentskills.thurkube.thurbeen.eu
spec:
  group: thurkube.thurbeen.eu
  names:
    categories: []
    kind: AgentSkill
    plural: agentskills
    shortNames:
    - ask
    singular: agentskill
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for AgentSkillSpec via `CustomResource`
        properties:
          spec:
            description: Defines a reusable skill from a GitHub repository.
            properties:
              name:
                description: Skill directory name within the repository.
                type: string
              ref:
                default: main
                description: Git ref to checkout. Defaults to "main".
                type: string
              repo:
                description: GitHub repository in "owner/repo" format.
                type: string
            required:
            - name
            - repo
            type: object
        required:
        - spec
        title: AgentSkill
        type: object
    served: true
    storage: true
    subresources: {}
{{- end }}
