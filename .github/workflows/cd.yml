---
name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-release:
    name: Analyze commits for release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.parse.outputs.should_release }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install cocogitto
        uses: cocogitto/cocogitto-action@390bda87a19bf627e03ad075c67a11e9ddbb7547 # v4
        with:
          command: check

      - name: Parse release decision
        id: parse
        run: |
          if VERSION="$(cog bump --auto --dry-run 2>&1)"; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Release needed: $VERSION"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
            echo "No releasable commits: $VERSION"
          fi

  create-tag:
    name: Create release tag
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Create version tag
        uses: cocogitto/cocogitto-action@390bda87a19bf627e03ad075c67a11e9ddbb7547 # v4
        with:
          command: bump
          args: --auto
          git-user: 'github-actions[bot]'
          git-user-email: 'github-actions[bot]@users.noreply.github.com'

      - name: Push tag to repository
        run: git push --tags

  build-and-push:
    name: Build and push container image
    needs: [check-release, create-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.check-release.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.check-release.outputs.version }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            THURKUBE_RELEASE_VERSION=${{ needs.check-release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-chart:
    name: Publish Helm chart
    needs: [check-release, create-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.check-release.outputs.version }}

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.3

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin

      - name: Package and push chart
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          VERSION="${VERSION#v}"
          helm package charts/thurkube --version "$VERSION" --app-version "$VERSION"
          helm push "thurkube-${VERSION}.tgz" oci://${{ env.REGISTRY }}/thurbeen/charts

  generate-changelog:
    name: Generate changelog
    needs: [check-release, create-tag]
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.stdout }}
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.check-release.outputs.version }}
          fetch-depth: 0

      - name: Generate changelog for release
        uses: cocogitto/cocogitto-action@390bda87a19bf627e03ad075c67a11e9ddbb7547 # v4
        id: changelog
        with:
          command: changelog
          args: --at ${{ needs.check-release.outputs.version }}

  publish:
    name: Publish GitHub Release
    needs: [check-release, create-tag, build-and-push, publish-chart, generate-changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.check-release.outputs.version }}
          name: ${{ needs.check-release.outputs.version }}
          body: |
            ## Container Image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ needs.check-release.outputs.version }}
            ```

            ## Helm Chart

            ```
            helm pull oci://ghcr.io/thurbeen/charts/thurkube --version ${{ needs.check-release.outputs.version }}
            ```

            ## Changelog

            ${{ needs.generate-changelog.outputs.changelog || 'See commit history for details.' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
